repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest with 95% coverage minimum
        entry: bash scripts/check-coverage.sh
        language: system
        pass_filenames: false
        always_run: true
